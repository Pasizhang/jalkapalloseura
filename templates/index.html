<!DOCTYPE html>
<html>

<head>
  <title>jalkapalloseura</title>
</head>

<body>
  <h1>jalkapalloseura</h1>
  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, id-numerosi on {{session.user_id}}
  </p>
  {% endif %}

  </p>
    <a href="/login">kirjaudu sisään</a>
    <a href="/register">luo tunnus</a>
    <a href="/logout">kirjaudu ulos</a>
  </p>
    <a href="/new_item">uusi ilmoitus</a>
    <a href="/find_item">etsi ilmoitus</a>
  </p>

  <h2>Ilmoitukset</h2>
  {% for item in items %}
  <li><a href="/item/{{item.id}}">{{item.place}}</a></li>
  {% endfor %}
  </ul>
</body>

</html>
